# docker-compose defines every infrastructure service as a unit.
# "docker-compose up -d" starts them all in the background. Each service runs in its
# own container but shares a private Docker network, so services can reach each other
# by service name (the backend connects to Postgres at host "postgres", not "localhost").

services:

  # ##### Postgres #####
  # Credentials come from a .env file so they are never hardcoded in source control.
  # The named volume persists database files across restarts; without it every
  # "docker-compose down" would wipe all data. The healthcheck lets dependent
  # services wait until Postgres is actually accepting connections before starting.
  postgres:
    image: postgres:16-alpine
    container_name: chatnet-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ##### Redis #####
  # Handles two separate concerns. First: the SignalR backplane, which fans out hub
  # messages to all connected server instances so every client receives events
  # regardless of which server they are connected to. Second: presence tracking,
  # using TTL keys that expire automatically when a user stops sending heartbeats,
  # so no cleanup job is needed to mark users as offline.
  redis:
    image: redis:7-alpine
    container_name: chatnet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ##### Jaeger #####
  # Receives OpenTelemetry traces from the backend and provides a UI at
  # http://localhost:16686. Each HTTP request becomes a trace made of spans: one
  # per database query, MediatR dispatch, and SignalR fanout, so you can see exactly
  # where latency comes from on any given request.
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: chatnet-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

  # ##### Adminer #####
  # Lightweight browser-based database UI. Open http://localhost:8080 then:
  # System: PostgreSQL, Server: postgres, Username/Password/Database from your .env file.
  adminer:
    image: adminer:latest
    container_name: chatnet-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

# Docker manages where named volumes live on disk.
# Data persists across "docker-compose down" but is wiped by "docker-compose down -v".
volumes:
  postgres-data:
  redis-data:
